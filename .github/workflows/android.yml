name: Android CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > my-release-key.jks

      - name: Build with Gradle (Release)
        env:
          KEYSTORE_FILE: my-release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CloudX
          path: app/build/outputs/apk/release/*.apk

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)

          if [ "${#apks[@]}" -eq 0 ]; then
            echo "::error::No release APK found"
            exit 1
          fi

          for apk in "${apks[@]}"; do
            filename="$(basename "$apk")"
            abi="$filename"
            abi="${abi#app-}"
            abi="${abi%-release.apk}"

            if [ "$abi" = "release.apk" ]; then
              target="dist/CloudX-${GITHUB_REF_NAME}.apk"
            else
              target="dist/CloudX-${GITHUB_REF_NAME}-${abi}.apk"
            fi

            cp "$apk" "$target"
          done

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME}"
          previous_tag="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"

          if [ -n "$previous_tag" ]; then
            range="$previous_tag..$tag"
            changes="$(git log --no-merges --pretty=format:'- %s (%h)' "$range")"
          else
            range="$tag"
            changes="$(git log --no-merges --pretty=format:'- %s (%h)' "$tag")"
          fi

          {
            echo "## 更新内容"
            echo
            if [ -n "$changes" ]; then
              printf '%s\n' "$changes"
            else
              echo "- 无提交记录"
            fi
            echo
            echo "## 构建信息"
            echo
            echo "- Tag: $tag"
            echo "- Commit: ${GITHUB_SHA}"
            if [ -n "$previous_tag" ]; then
              echo "- Compare: $previous_tag...$tag"
            else
              echo "- Compare: $range"
            fi
            echo "- Built at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > release-notes.md

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="CloudX ${tag}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file release-notes.md
            gh release upload "$tag" dist/*.apk --clobber
          else
            gh release create "$tag" dist/*.apk \
              --title "$title" \
              --notes-file release-notes.md \
              --verify-tag
          fi
